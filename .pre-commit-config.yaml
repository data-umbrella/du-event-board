default_stages:
  - pre-commit

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-json
      - id: check-yaml
      - id: check-case-conflict
      - id: detect-private-key

  - repo: local
    hooks:
      # ✅ ADD PRETTIER HERE
      - id: prettier
        name: prettier
        entry: npx prettier --write .
        language: system
        pass_filenames: false
        types_or:
          - javascript
          - jsx
          - ts
          - tsx
          - css
          - json

      - id: ruff-format
        name: ruff-format
        entry: ruff format
        files: "scripts/"
        language: system
        pass_filenames: true
        types:
          - python

      - id: ruff-linter
        name: ruff-linter
        entry: ruff check
        language: system
        files: "scripts/"
        pass_filenames: true
        types:
          - python

      - id: mypy
        name: mypy
        entry: mypy scripts/
        language: system
        pass_filenames: false

      - id: douki
        name: douki
        entry: douki sync
        language: system
        pass_filenames: true
        require_serial: yes
        files: "./"
        types:
          - python

      - id: vulture
        name: vulture
        entry: vulture --min-confidence 80
        language: system
        files: "scripts/"
        pass_filenames: true
        types:
          - python

      - id: eslint
        name: eslint
        entry: npx eslint
        language: system
        pass_filenames: true
        types_or:
          - javascript
          - jsx

      - id: vitest
        name: vitest
        entry: npx vitest run
        language: system
        pass_filenames: false
        types_or:
          - javascript
          - jsx
